<app-header></app-header>
<a href="javascript:void(0);" (click)="backClicked()" class="back_navigator">
    <img src="assets/images/back-btn.png" alt="back button" title="Back to prevoius view">
</a>
<section class="top-space container">
    <div class="row" *ngIf="isLoading">
        <mat-spinner class="mx-auto"></mat-spinner>
    </div>
    <div class="row savings-box" *ngIf="lists.length > 0 && !isLoading">
        <div class="col-md-12">
            <div class="section-title mb-5">
                <h2 class=" mb-3 section-title border-0 ct_after_line_none">My Circle Members</h2>
                <p class=" mb-4 ct_fw_600 text-center ct_fs_20" style="color: #F2994A ;">{{(circleName)}}</p>
            </div>
            <div class="search-results">
                <div class="row">
                    <div class="col-lg-12 px-lg-3 px-0" *ngFor="let data of lists; let i = index">
                        <div class="old-heights show-accordion">
                            <div
                                class="box-line-white second-line-none border-0 rounded-0 py-4 mt-0 mb-2 border-left-5">
                                <!-- {{i+1}} -->
                                <div class="row">
                                    <div class="col-12 right-box text-left d-flex">
                                        <div class="" data-toggle="modal" data-target="#img22">
                                            <a class="nav-link profile-click have-notification mt-0"
                                                href="javascript:void(0)">
                                                <!-- <img src="assets/images/user-img.png" class="img-fluid"> -->
                                                <div (click)="showImg(data.profile_image)">
                                                    <img [src]="data?.profile_image ? data?.profile_image : 'assets/img/np_pro.png'"
                                                        class="img-fluid">
                                                </div>
                                            </a>
                                        </div>
                                        <div class="ml-3 w-100">
                                            <div class="d-flex align-items-center">
                                                <p class="sub-para text-left mr-3">{{data.first_name}}
                                                    {{data.last_name}}</p>
                                            </div>
                                            <!-- <span class="extra-para">{{data.email}}</span> -->
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="loadmoreuserqsn" class="text-center mt-4" *ngIf="notEmptyPost">
                <div class="row pb-5">
                    <div class="col-md-12 p-5">
                        <ngx-spinner bdOpacity=0.9 bdColor="" size="default" color="#581f87" type="ball-pulse-sync"
                            [fullScreen]="false">
                        </ngx-spinner>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<app-sub-menu></app-sub-menu>
<app-mobile-menu></app-mobile-menu>
<app-footer></app-footer>

<!-- Img -->
<div class="modal fade" id="img22">
    <div class="modal-dialog">
        <div class="modal-content">
            <img [src]="userImg1 ? userImg1 : 'assets/img/np_pro.png'" alt="img">
        </div>
    </div>
</div>
